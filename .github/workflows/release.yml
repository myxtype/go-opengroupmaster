name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ext: ""
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            ext: ""
          - goos: darwin
            goarch: amd64
            runner: macos-14
            ext: ""
          - goos: darwin
            goarch: arm64
            runner: macos-14
            ext: ""
          - goos: windows
            goarch: amd64
            runner: windows-latest
            ext: ".exe"
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        id: setup-go
        with:
          go-version-file: go.mod

      - name: Export Go root for MSYS2
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $goRoot = go env GOROOT
          "GO_ROOT=$goRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup Linux arm64 cross toolchain
        if: matrix.goos == 'linux' && matrix.goarch == 'arm64'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Setup MinGW for Windows CGO
        if: matrix.goos == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Build binary (non-Windows)
        if: matrix.goos != 'windows'
        run: |
          set -euo pipefail
          mkdir -p dist
          bin="groupmasterbot-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          pkg="groupmasterbot-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "dist/${pkg}"

          # Use project-local dict directory.
          dict_src="./dict"
          if [ ! -d "${dict_src}" ]; then
            echo "project dict directory not found: ${dict_src}" >&2
            exit 1
          fi

          export CGO_ENABLED=1
          export GOOS=${{ matrix.goos }}
          export GOARCH=${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "linux" ] && [ "${{ matrix.goarch }}" = "arm64" ]; then
            export CC=aarch64-linux-gnu-gcc
            export CXX=aarch64-linux-gnu-g++
          fi
          go build -trimpath -o "dist/${pkg}/${bin}" ./cmd

          # Package binary + project dict/.
          cp -R "${dict_src}" "dist/${pkg}/dict"
          tar -C dist -czf "dist/${bin}.tar.gz" "${pkg}"

      - name: Build binary (Windows)
        if: matrix.goos == 'windows'
        shell: msys2 {0}
        run: |
          set -euo pipefail
          export PATH="$(cygpath "${GO_ROOT}")/bin:${PATH}"
          mkdir -p dist
          bin="groupmasterbot-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          pkg="groupmasterbot-${{ matrix.goos }}-${{ matrix.goarch }}"
          mkdir -p "dist/${pkg}"

          dict_src="./dict"
          if [ ! -d "${dict_src}" ]; then
            echo "project dict directory not found: ${dict_src}" >&2
            exit 1
          fi

          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 CC=gcc CXX=g++ \
            go build -trimpath -o "dist/${pkg}/${bin}" ./cmd

          cp -R "${dict_src}" "dist/${pkg}/dict"
          tar -C dist -czf "dist/${bin}.tar.gz" "${pkg}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > checksums.txt

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
